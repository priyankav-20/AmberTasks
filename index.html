<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AmberTasks</title>


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">


  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-wrapper">

    <main class="todo-card" role="main">


      <header class="todo-header">
        <div class="header-top">
          <div class="brand">
            <svg class="brand-logo" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 11L11 13L15 9M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1>AmberTasks</h1>
          </div>


          <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode" title="Toggle dark/light theme">

            <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>

            <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
        </div>

        <p class="header-subtitle">Stay organized, focused, and productive.</p>
      </header>


      <section class="task-form-section" aria-label="Add a new task">
        <form id="todo-form" class="todo-form">
          <div class="input-group">
            <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off" aria-label="Task description" required>

            <div class="form-controls">

              <div class="priority-wrapper">
                <label for="task-priority" class="sr-only">Priority</label>
                <select id="task-priority" aria-label="Select task priority">
                  <option value="low">Low Priority</option>
                  <option value="medium" selected>Medium Priority</option>
                  <option value="high">High Priority</option>
                </select>
              </div>


              <button type="submit" id="add-task-btn" class="btn-primary" aria-label="Add task">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>Add Task</span>
              </button>
            </div>
          </div>
        </form>
      </section>


      <section class="search-filter-section" aria-label="Filters and search">
        <div class="search-wrapper">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="search-input" placeholder="Search tasks..." aria-label="Search tasks">
          <button id="clear-search-btn" class="clear-search-btn" type="button" aria-label="Clear search" style="display: none;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </section>


      <section class="stats-bar" aria-label="Task statistics and filter operations">
        <span class="items-counter" id="items-counter">0 items left</span>

        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="active">Active</button>
          <button class="filter-tab" data-filter="completed">Completed</button>
        </div>

        <button id="clear-completed-btn" class="btn-link" type="button">Clear Completed</button>
      </section>


      <section class="list-section" aria-label="Task list">
        <ul id="todo-list" class="todo-list" aria-live="polite">

        </ul>


        <div id="empty-state" class="empty-state" style="display: none;">
          <div class="empty-state-illustration">

            <svg width="180" height="180" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="100" cy="100" r="75" fill="var(--empty-circle-bg)" />
              <rect x="70" y="60" width="60" height="80" rx="6" fill="var(--empty-card-bg)" stroke="var(--primary-color)" stroke-width="3" />
              <line x1="82" y1="78" x2="118" y2="78" stroke="var(--empty-line-color)" stroke-width="3" stroke-linecap="round" />
              <line x1="82" y1="94" x2="118" y2="94" stroke="var(--empty-line-color)" stroke-width="3" stroke-linecap="round" />
              <line x1="82" y1="110" x2="106" y2="110" stroke="var(--empty-line-color)" stroke-width="3" stroke-linecap="round" />
              <circle cx="130" cy="120" r="25" fill="var(--empty-badge-bg)" />
              <path d="M122 120L127 125L138 114" stroke="var(--primary-color)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
          <h2 class="empty-state-title">All Caught Up!</h2>
          <p class="empty-state-subtitle">Your to-do list is empty. Add a task to start organizing your day.</p>
        </div>
      </section>


      <footer class="app-footer">

        <p>&copy; 2024 Ambertasks. All rights reserved.</p>
        <p>Built by <span class="developer-name">Priyanka</span> using HTML, CSS, and JavaScript.</p>


      </footer>

    </main>
  </div>


  <script src="app.js"></script>
</body>
</html>
